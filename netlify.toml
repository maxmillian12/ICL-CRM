[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION      = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Next.js plugin — required for SSR, API routes, and image optimization
[[plugins]]
  package = "@netlify/plugin-nextjs"

# SPA fallback — let Next.js handle all routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "SAMEORIGIN"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
